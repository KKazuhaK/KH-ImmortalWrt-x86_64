#
# ImmortalWrt Multi-Target Build Workflow
# Adapted from P3TERX/Actions-OpenWrt (MIT License)
# https://github.com/P3TERX/Actions-OpenWrt
#

name: Build ImmortalWrt

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '**/*.md'
      - 'scripts/*.ps1'
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions (tmate) for debugging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      upload_bin_dir:
        description: 'Upload bin directory as artifact'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      upload_release:
        description: 'Publish firmware as a GitHub Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: '2G'

jobs:
  prep:
    name: Prepare release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      publish: ${{ steps.tag.outputs.publish }}
    steps:
      - id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.inputs.upload_release }}" = "true" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "release_tag=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "release_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Create empty release
        if: steps.tag.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ImmortalWrt ${{ steps.tag.outputs.release_tag }}
          body: |
            ImmortalWrt `${{ env.REPO_BRANCH }}` x86 build.

            **Targets included**:
            - `x86_64`      — 64-bit x86 (N100 / J4125 / modern software routers / PVE / ESXi)
            - `x86_generic` — 32-bit i686 (legacy PCs)

            Each target produces both **UEFI** and **legacy BIOS** images:
            - `*-squashfs-combined-efi.img.gz` — UEFI boot
            - `*-squashfs-combined.img.gz`     — legacy BIOS boot
            - `*-ext4-combined-efi.img.gz`     — UEFI + ext4 (resizable rootfs)
            - `*-ext4-combined.img.gz`         — BIOS + ext4
            - `*-rootfs.tar.gz`                — for LXC / Docker / custom installs

            First flash and subsequent in-place upgrades use the **same image**
            (write to disk for first flash, upload via LuCI for upgrades).

  build:
    name: Build (${{ matrix.target.name }})
    needs: prep
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64
            config: configs/x86_64.config
          - name: x86_generic
            config: configs/x86_generic.config
    env:
      CONFIG_FILE: ${{ matrix.target.config }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free up disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
          gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
          lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev \
          libtool libyaml-dev libz-dev lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
          patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools \
          qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone --depth=1 --branch $REPO_BRANCH $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        mkdir -p $CCACHE_DIR

    - name: Hash target config
      id: cfghash
      run: echo "hash=$(sha256sum $CONFIG_FILE | cut -d' ' -f1)" >> $GITHUB_OUTPUT

    - name: Restore dl cache
      uses: actions/cache@v4
      with:
        path: /workdir/openwrt/dl
        key: ${{ runner.os }}-${{ matrix.target.name }}-dl-${{ env.REPO_BRANCH }}-${{ steps.cfghash.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target.name }}-dl-${{ env.REPO_BRANCH }}-

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ runner.os }}-${{ matrix.target.name }}-ccache-${{ env.REPO_BRANCH }}-${{ steps.cfghash.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target.name }}-ccache-${{ env.REPO_BRANCH }}-

    - name: Load custom feeds
      run: |
        if [ -e $FEEDS_CONF ] && grep -q '^src-git' $FEEDS_CONF; then
          echo "Overriding feeds.conf.default with custom one"
          cp $FEEDS_CONF openwrt/feeds.conf.default
        else
          echo "No active src-git line in $FEEDS_CONF — using upstream feeds.conf.default"
        fi
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: ${{ github.event.inputs.ssh == 'true' }}
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && github.event.inputs.upload_bin_dir == 'true'
      with:
        name: ImmortalWrt_bin_${{ matrix.target.name }}${{ env.FILE_DATE }}
        path: openwrt/bin
        retention-days: 7

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages

        # Trim non-flashable intermediates so the Release page stays readable.
        # KEEP: *-sysupgrade.bin/img.gz, *-factory.bin/img.gz, *-combined*.img.gz,
        #       *-sdcard.img.gz, *-rootfs.tar.gz, sha256sums, *.manifest,
        #       profiles.json, *.buildinfo
        # DROP: standalone kernels, raw rootfs partitions, initramfs, recovery,
        #       bootloader fragments, dtbs, ELF artifacts.
        shopt -s nullglob
        trim=(
          *-kernel.bin
          *-rootfs.img.gz
          *-rootfs-squashfs.img
          *-initramfs*
          *-recovery.*
          *-bl2.img
          *-bl31.bin
          *-fip.bin
          *-bl2-bl31.bin
          *-bl2-bl31-fip.bin
          *-preloader.bin
          *-tee.bin
          *-u-boot.bin
          *-u-boot*.fip
          *.dtb
          *.elf
          *.fit
          *.uImage
        )
        echo "--- before trim ---"
        ls -1 | wc -l
        for pat in "${trim[@]}"; do
          rm -f -- $pat
        done
        echo "--- after trim ---"
        ls -1 | wc -l

        # Dedup: for routers, when factory and sysupgrade are byte-identical,
        # only keep sysupgrade (the upgrade path is the universal one).
        # When they differ (different image headers), keep both — they really
        # have different uses (factory = first-flash from OEM, sysupgrade = in-OpenWrt upgrade).
        dedup_count=0
        for fac in *-factory.bin *-factory.img.gz; do
          [ -f "$fac" ] || continue
          sys="${fac/-factory./-sysupgrade.}"
          [ -f "$sys" ] || continue
          if cmp -s "$fac" "$sys"; then
            echo "identical: removing $fac (same bytes as $sys)"
            rm -f -- "$fac"
            dedup_count=$((dedup_count + 1))
          fi
        done
        echo "--- after dedup ($dedup_count duplicates removed) ---"
        ls -1 | wc -l

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success' && needs.prep.outputs.publish == 'true' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.prep.outputs.release_tag }}
        files: ${{ env.FIRMWARE }}/*
