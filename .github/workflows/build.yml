#
# ImmortalWrt x86_64 — ImageBuilder pipeline
#
# We download ImmortalWrt's official, pre-compiled ImageBuilder for the
# x86/64 target and use it to assemble a firmware containing the packages
# listed in `packages.list`. This avoids cross-compiling from source
# (and the long, fragile dependency chain that broke ~50% of our recent
# builds on upstream package issues like sing-box's vendored tailscale
# fork or the missing libyaml).
#
# When you want a different package set, edit packages.list and push.
# A typical build runs in 10-15 minutes vs 1-3 hours for source builds.
#

name: Build ImmortalWrt (ImageBuilder)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '**/*.md'
      - 'scripts/*.ps1'
  workflow_dispatch:
    inputs:
      ibuilder_version:
        description: 'ImmortalWrt release to use (e.g. 24.10.2, SNAPSHOT)'
        required: false
        default: '24.10.2'
      upload_release:
        description: 'Publish firmware as a GitHub Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IBUILDER_VERSION: ${{ github.event.inputs.ibuilder_version || '24.10.2' }}
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build (x86_64 / ImageBuilder)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Note: source-build needed jlumbroso/free-disk-space to clear ~30 GB
    # for the build_dir. ImageBuilder only uses ~5 GB total, well within
    # the default 14 GB free on a fresh runner, so we skip that step here
    # and save ~2 minutes per run. Add it back if package list grows huge.

    - name: Install ImageBuilder dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install -y \
          build-essential libncurses-dev libssl-dev \
          python3 python3-distutils python3-setuptools \
          rsync unzip zstd wget curl gawk file gettext \
          qemu-utils
        sudo timedatectl set-timezone "$TZ"

    - name: Download ImageBuilder
      run: |
        url="https://downloads.immortalwrt.org/releases/${IBUILDER_VERSION}/targets/x86/64/immortalwrt-imagebuilder-${IBUILDER_VERSION}-x86-64.Linux-x86_64.tar.zst"
        echo "Downloading $url"
        wget -q --show-progress -O imagebuilder.tar.zst "$url"
        unzstd imagebuilder.tar.zst -o imagebuilder.tar
        tar xf imagebuilder.tar
        rm imagebuilder.tar imagebuilder.tar.zst
        mv immortalwrt-imagebuilder-* imagebuilder
        echo "IBUILDER_DIR=$PWD/imagebuilder" >> $GITHUB_ENV

    - name: Add third-party .ipk repositories
      run: |
        cd "$IBUILDER_DIR"
        # ImmortalWrt's own repositories already cover most of what we want
        # (PassWall, OpenClash, Argon, sing-box, xray-core, tailscale,
        # cloudflared, vlmcsd, hysteria, shadowsocks-rust-sslocal, etc.).
        # We only add kiddin9's mirror as a SUPPLEMENT for things upstream
        # doesn't ship — PassWall 2, luci-app-tailscale, homeproxy, newer
        # sing-box/xray. URL discovered: dl.openwrt.ai/packages-24.10/x86_64/kiddin9/
        # (op.supes.top redirects to dl.openwrt.ai but to the wrong path).
        printf '\n# kiddin9 supplemental mirror (PassWall 2, luci-app-tailscale, homeproxy, ...)\nsrc/gz kiddin9 https://dl.openwrt.ai/packages-24.10/x86_64/kiddin9\n' >> repositories.conf
        # Disable signature checks so unsigned .ipks from third-party
        # mirrors install without --force-checksum hacks.
        sed -i 's/^option check_signature/# option check_signature/' repositories.conf
        echo "--- repositories.conf (final) ---"
        cat repositories.conf

    - name: Build image
      id: build
      run: |
        cd "$IBUILDER_DIR"

        # Flatten packages.list — strip comments + blank lines, join with spaces.
        packages=$(grep -vE '^\s*(#|$)' "$GITHUB_WORKSPACE/packages.list" | tr '\n' ' ')
        echo "::group::Package list"
        echo "$packages" | tr ' ' '\n' | sed '/^$/d'
        echo "::endgroup::"

        # Profile generic = stock x86/64 (UEFI + BIOS combined images).
        make image \
          PROFILE=generic \
          PACKAGES="$packages" \
          ROOTFS_PARTSIZE=1024

        # Sanity check: ImageBuilder will return zero even when individual
        # opkg installs fail (e.g. Unknown package, file clash) — it just
        # logs "Collected errors" and moves on, sometimes without producing
        # the combined image. Run 25716643619 did exactly that and shipped
        # an empty Release. Fail the step if no *-combined-efi.img.gz exists.
        out_dir="bin/targets/x86/64"
        if ! compgen -G "$out_dir/*-combined-efi.img.gz" >/dev/null; then
          echo '::error::No firmware image produced.'
          echo 'Contents of out_dir:'
          ls -la "$out_dir/" 2>&1 || true
          exit 1
        fi

        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

    - name: Show disk usage
      if: ${{ !cancelled() }}
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.build.outputs.status == 'success'
      run: |
        cd "$IBUILDER_DIR/bin/targets/x86/64"
        # Same trim policy as the old source-build workflow: only ship
        # what a user actually flashes. ImageBuilder produces fewer
        # intermediate artifacts than source build, but trim defensively.
        shopt -s nullglob
        trim=(*-kernel.bin *-rootfs.img.gz *-rootfs-squashfs.img *-initramfs*)
        for pat in "${trim[@]}"; do rm -f -- $pat; done
        echo "--- final files ---"
        ls -lh
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: |
        steps.organize.outputs.status == 'success' &&
        (github.event_name == 'push' || github.event.inputs.upload_release == 'true')
      run: |
        echo "release_tag=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_OUTPUT

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.release_tag != ''
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: ImmortalWrt ${{ steps.tag.outputs.release_tag }} (ImageBuilder ${{ env.IBUILDER_VERSION }})
        body: |
          Built by ImmortalWrt **${{ env.IBUILDER_VERSION }}** ImageBuilder.
          All packages come from upstream ImmortalWrt + kenzok8 mirror — no source compile.

          Recommended images:
          * **UEFI**:  `immortalwrt-*-x86-64-generic-squashfs-combined-efi.img.gz`
          * **BIOS**:  `immortalwrt-*-x86-64-generic-squashfs-combined.img.gz`
          * **LXC/Docker rootfs**:  `immortalwrt-*-x86-64-generic-rootfs.tar.gz`

          Default LAN: `192.168.1.1`. First boot you'll be asked to set the root password.
        files: ${{ env.FIRMWARE }}/*
